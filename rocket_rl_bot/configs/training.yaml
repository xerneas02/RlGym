project:
  name: rocket_rl_bot
  run_name_prefix: ppo_1v1_v2
  seed: 42
  device: auto
  resume_latest: false

environment:
  team_size: 1
  spawn_opponents: true
  tick_skip: 8
  frame_rate: 120
  simulation_speed_multiplier: 100
  num_envs: 8
  timeout_steps: 600
  no_touch_timeout_steps: 225
  copy_gamestate_every_step: false

training:
  total_steps: 100000000
  rollout_steps: 8192
  batch_size: 65536
  minibatch_size: 4096
  epochs: 3
  gamma: 0.995
  gae_lambda: 0.95
  clip_range: 0.2
  entropy_coef: 0.01
  value_coef: 1.0
  learning_rate: 0.0003
  max_grad_norm: 0.5
  eval_interval_steps: 5000000
  checkpoint_interval_steps: 5000000
  log_interval_steps: 16384
  reward_component_log_interval_steps: 8192

evaluation:
  num_matches: 16
  max_steps_per_match: 600
  scripted_opponent: bronze_chaser
  deterministic: true
  seed: 1042
  protocol: benchmark
  benchmark_weights:
    kickoff_like: 0.08
    open_goal_attack: 0.16
    simple_defense: 0.16
    ball_center_random: 0.20
    wall_ball: 0.10
    random_match_state: 0.30

runtime:
  mixed_precision: false
  deterministic_torch: false
  torch_num_threads: 1

paths:
  logs_dir: logs
  checkpoints_dir: checkpoints
