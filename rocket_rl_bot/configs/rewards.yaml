descriptions:
  goal_reward: "Sparse and dominant match objective. +1 if the agent's team scores, -1 if it concedes."
  ball_goal_progress: "Dense shaping from ball velocity projected toward the opponent goal."
  velocity_to_ball: "Encourages decisive approaches instead of drifting or reversing away from the play."
  touch_reward: "Rewards only touches that keep the ball useful: moving, directed, and not dead taps."
  defense_position: "Keeps the bot goal-side of the ball when the play is in its own half."
  boost_efficiency: "Light pressure to keep speed without bleeding boost on wasteful holds."
