descriptions:
  goal_reward: "Sparse and dominant match objective. +1 if the agent's team scores, -1 if it concedes."
  ball_goal_progress: "Dense shaping from actual ball progress toward the opponent goal, reinforced by forward ball speed."
  velocity_to_ball: "Light approach reward to stop indecision without turning the policy into pure ball chase."
  touch_reward: "Rewards touches that improve ball progress, speed, and useful control; poor backward touches can be penalized."
  defense_position: "Structural positioning reward: goal-side support in defense, behind-ball support in attack."
  boost_efficiency: "Very small pressure against wasteful boost holds, kept intentionally weak."
