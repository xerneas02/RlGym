descriptions:
  goal_reward: "Sparse and dominant match objective. +1 if the agent's team scores, -1 if it concedes."
  ball_goal_progress: "Dense shaping from actual ball progress toward the opponent goal, reinforced by forward ball speed."
  velocity_to_ball: "Approach reward with kickoff commitment bonus so the bot attacks the ball decisively instead of hovering."
  touch_reward: "Rewards purposeful contacts that create speed or progress, and penalizes soft neutral taps."
  defense_position: "Structural positioning reward: goal-side support in defense, behind-ball support in attack."
  boost_efficiency: "Very small pressure against wasteful boost holds, kept intentionally weak."
  ball_touch_reward: "Legacy touch-focused signal with a light height bonus to distinguish stronger ball contacts."
  distance_player_ball: "Legacy proximity shaping that rewards staying usefully connected to the ball."
  align_ball_goal: "Legacy geometric alignment reward between the player, the ball and the attacking lane toward goal."
  save_reward: "Legacy defensive touch reward for pushing the ball away from your own net after a threatened situation."
